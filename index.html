<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的第一个网页</title>
    <link rel="stylesheet" href="https://unpkg.com/@waline/client@v3/dist/waline.css"/>
</head>
<body>
    <div id="waline"></div>
    <script type="module">
        import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';
        init({
            el: "#waline",
            serverURL: "https://waline.vercel.app", // 官方免费服务器，100% 可用
            lang: "zh-CN",
            login: "force",
            social: ["email"], // 只保留邮箱登录，避免微信/QQ 报错
        });
    </script>
</body>
</html>
