<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>这是陈冠霖的网页</title>
    <link rel="stylesheet" href="https://unpkg.com/@waline/client@v3/dist/waline.css"/>
</head>
<body>

    <h1>欢迎来到我的互动网页！</h1>
    
    <div id="waline"></div>

    <script type="module">
        import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';

        init({
            el: '#waline',
            serverURL: 'https://my-waline-comment-five.vercel.app/', // ⚠️ 这里替换成你刚复制的网址！
            login: 'enable',  // 允许登录
            dark: 'auto',     // 自动切换夜间模式
            search: false,    // 隐藏表情包搜索（为了速度）
        });
    </script>

</body>
</html>
