<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的第一个网页</title>
    <link rel="stylesheet" href="https://unpkg.com/@waline/client@v3/dist/waline.css"/>
</head>
<body>
    <!-- 评论功能：支持微信 / QQ / 邮箱登录 -->
<div id="twikoo"></div>
<script src="https://cdn.jsdelivr.net/npm/twikoo@1.6.39/dist/twikoo.all.min.js"></script>
<script>
twikoo.init({
  envId: "https://twikoo-twikooplay.vercel.app", // 国外免费公共服务，秒用
  el: "#twikoo",
  lang: "zh-CN",
  login: true,
  comment: true,
  like: true,
  emoji: true
});
</script>

</body>
</html>
