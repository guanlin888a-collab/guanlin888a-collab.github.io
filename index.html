<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的网页</title>
    <link rel="stylesheet" href="https://unpkg.com/@waline/client@v3/dist/waline.css"/>
</head>
<body>
    <h1>欢迎来到我的网页</h1>
    <div id="waline"></div>

    <script type="module">
        import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';
        
        init({
            el: "#waline",
            // 修改你 index.html 里的这一行
        serverURL: 'https://comment.chenguanlin.com',
            lang: "zh-CN",
            path: '/',  /* <-- 强制读取根目录的评论 */
        });
    </script>
</body>
</html>
